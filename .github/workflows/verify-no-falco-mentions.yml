name: No Falco Mentions

# Wave 8f anchor (2026-05-04). Falco was removed as an integration in
# Wave 8b/8c. Internal "Falco-mode" / "Falco-like" code idioms in
# `crates/agent/src/` were renamed to "rules-only mode". This workflow
# fails the PR if any new Falco mention lands in agent source so the
# anachronism cannot creep back in silently.

on:
  pull_request:
  push:
    branches:
      - main
      - development

permissions:
  contents: read

jobs:
  verify-no-falco-mentions:
    name: Verify no Falco mentions in agent source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run verify-no-falco-mentions.sh
        run: ./scripts/verify-no-falco-mentions.sh
