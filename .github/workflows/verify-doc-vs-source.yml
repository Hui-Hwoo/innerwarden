name: Doc vs Source

# Two doc-honesty gates:
#  1. verify-doc-vs-source: collector/detector LISTS in `.claude/CLAUDE.md`
#     match `crates/sensor/src/{collectors,detectors}/` (gitignored file, so
#     this skips cleanly on CI checkouts that lack it).
#  2. verify-readme-counts: the count CLAIMS in README.md agree with
#     themselves and with the source tree. README is tracked + public, so
#     this one always runs. Added after a 2026-06 audit found 96 stale-count
#     inconsistencies across the docs (README itself had two internal
#     contradictions); counts can no longer silently drift.

on:
  pull_request:
  push:
    branches:
      - main
      - development

permissions:
  contents: read

jobs:
  verify-doc-vs-source:
    name: Verify CLAUDE.md matches sensor source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run verify-doc-vs-source.sh
        run: ./scripts/verify-doc-vs-source.sh

  verify-readme-counts:
    name: Verify README counts match source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run verify-readme-counts.sh
        run: ./scripts/verify-readme-counts.sh
