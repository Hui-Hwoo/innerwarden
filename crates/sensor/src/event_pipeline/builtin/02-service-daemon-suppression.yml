version: 1
metadata:
  author: innerwarden built-in
  description: >
    Drop file read/write events from web servers, databases, and auth
    services doing their normal job. Uses $service_daemons named list
    from 00-lists.yml. The defensive-allowlist (priority 1000) ensures
    credential/config path reads from these daemons are still persisted.

rules:
  - id: drop-service-daemon-file-ops
    priority: 80
    match:
      source: ebpf
      kind_in:
        - file.read_access
        - file.write_access
      comm_in:
        - $service_daemons
    action: drop
    drop_reason: service-daemon-self-traffic
