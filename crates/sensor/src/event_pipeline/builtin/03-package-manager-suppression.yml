version: 1
metadata:
  author: innerwarden built-in
  description: >
    Drop file read/write events from package managers during their
    normal operation. Uses $package_managers named list from 00-lists.yml.

rules:
  - id: drop-package-manager-file-ops
    priority: 70
    match:
      source: ebpf
      kind_in:
        - file.read_access
        - file.write_access
      comm_in:
        - $package_managers
    action: drop
    drop_reason: package-manager-activity
