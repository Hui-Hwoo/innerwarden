version: 1
metadata:
  id: pb-credential-stuffing-default
  name: "Credential stuffing / SSH brute force default response"
  description: >-
    Deterministic response for CL-005 SSH brute-force chains. Blocks the
    source IP for a longer window (24 h) than DATA_EXFIL because credential
    stuffing is a slower attack pattern; suspends the targeted user for
    operator review; alerts the on-call channel. Cloud safelist + trusted
    IPs are honoured.

triggers:
  - chain_id: "CL-005"
  - rule_id: "ssh_bruteforce"
  - kind_glob: "kill_chain_detected_CREDENTIAL_*"

conditions:
  ip_not_in: ["$cloud_safelist", "$trusted_ips"]
  sample_rate: 1.0

steps:
  - id: block_long
    skill: block_ip_xdp
    args:
      ttl_secs: 86400
    retry:
      count: 3
      backoff: exponential
      base_ms: 200
    on_error: continue

  - id: suspend_targeted_user
    skill: suspend_user_sudo
    args:
      user: "{trigger.target_user}"
      reason: "InnerWarden CL-005 — credential stuffing detected"
    condition:
      target_user_present: true
    on_error: continue

  - id: alert_oncall
    skill: route_alert
    args:
      destination: slack
      severity_override: high
      dedup_key_template: "iw:{rule_id}:{primary_ip}"
    on_error: continue
